<div class="contenedor-modulo">
  <button class="boton-volver" routerLink="/noticias">← Regresar a Sala de Redaccion</button>

  <div class="encabezado-modulo">
    <h2 class="titulo-editor">{{ modoEditar ? 'Editar Noticia' : 'Redacción Noticia' }}</h2>
  </div>

  <form class="tarjeta-vintage sombra-retro formulario-edicion">

    <div *ngIf="mensajeError" class="alerta-error-retro">
      [FE DE ERRATAS]: {{ mensajeError }}
    </div>

    <div class="grupo-formulario">
      <label class="etiqueta-formulario">Categoria</label>
      <select class="entrada-vintage select-retro" [(ngModel)]="categoria" name="categoria">
        <option value="Politica">Politica</option>
        <option value="Economia">Economia</option>
        <option value="Cultura">Cultura</option>
        <option value="Deportes">Deportes</option>
        <option value="Tecnologia">Tecnologia</option>
      </select>
    </div>

    <div class="grupo-formulario">
      <label class="etiqueta-formulario">Titular Noticia</label>
      <input type="text" class="entrada-vintage" [(ngModel)]="titulo" name="titulo" placeholder="Escribe un encabezado de impacto para la primera plana...">
    </div>

    <div class="grupo-formulario-fila">
      <div class="columna-formulario">
        <label class="etiqueta-formulario">Corresponsal / Autor</label>
        <input type="text" class="entrada-vintage" [(ngModel)]="autor" name="autor" placeholder="Nombre del periodista escribiente...">
      </div>

      <div class="columna-formulario">
        <label class="etiqueta-formulario">Casa Editorial</label>
        <input type="text" class="entrada-vintage" [(ngModel)]="editorial" name="editorial" placeholder="Ej: Talleres Graficos del Norte...">
      </div>
    </div>

    <div class="grupo-formulario">
      <label class="etiqueta-formulario">Cuerpo del Texto / Contenido</label>
      <textarea class="entrada-vintage area-texto-larga" [(ngModel)]="contenido" name="contenido" placeholder="Desarrolle todo el cuerpo del articulo aqui..."></textarea>
    </div>

    <div class="acciones-formulario">
      <button type="button" class="boton-retro-secundario" routerLink="/noticias">Descartar Borrador</button>
      <button type="button" class="boton-retro" (click)="guardarPublicacion()">
        {{ modoEditar ? 'Guardar Cambios' : 'Publicar Noticia' }}
      </button>
    </div>
  </form>
</div>
