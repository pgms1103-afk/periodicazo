<div class="contenedor-modulo">
  <button class="boton-volver" routerLink="/noticias">← Regresar a Sala de Redaccion</button>

  <div class="encabezado-modulo">
    <h2 class="titulo-editor">Mesa de Redaccion: Editor de Noticias</h2>
  </div>

  <form class="tarjeta-vintage sombra-retro formulario-edicion">
    <div class="grupo-formulario">
      <label class="etiqueta-formulario">Categoria</label>
      <select class="entrada-vintage select-retro">
        <option>Tecnologia</option>
        <option>Ciencia</option>
        <option>Entretenimiento</option>
        <option>Cultura</option>
      </select>
    </div>

    <div class="grupo-formulario">
      <label class="etiqueta-formulario">Titular Noticia</label>
      <input type="text" class="entrada-vintage" placeholder="Escribe un encabezado de impacto para la primera plana...">
    </div>

    <div class="grupo-formulario-fila">
      <div class="columna-formulario">
        <label class="etiqueta-formulario">Corresponsal / Autor</label>
        <input type="text" class="entrada-vintage" placeholder="Nombre del periodista escribiente...">
      </div>

      <div class="columna-formulario">
        <label class="etiqueta-formulario">Casa Editorial</label>
        <input type="text" class="entrada-vintage" placeholder="Ej: Talleres Graficos del Norte...">
      </div>
    </div>

    <div class="grupo-formulario">
      <label class="etiqueta-formulario">Fecha y Hora de Emision</label>
      <input type="datetime-local" class="entrada-vintage">
    </div>

    <div class="grupo-formulario">
      <label class="etiqueta-formulario">Cuerpo del Texto / Contenido</label>
      <textarea class="entrada-vintage area-texto-larga" placeholder="Desarrolle todo el cuerpo del articulo aqui..."></textarea>
    </div>

    <div class="acciones-formulario">
      <button type="button" class="boton-retro-secundario" routerLink="/noticias">Descartar Borrador</button>
      <button type="button" class="boton-retro" routerLink="/noticias">Publicar Articulo</button>
    </div>
  </form>
</div>
