<div class="contenedor-modulo">
  <div class="encabezado-modulo">
    <h2 class="titulo-editor">Redactar Articulo</h2>
  </div>

  <form class="tarjeta-vintage sombra-retro formulario-edicion">
    <div class="grupo-formulario">
      <label class="etiqueta-formulario">Titulo Principal</label>
      <input type="text" class="entrada-vintage" placeholder="Escribe un titulo impactante...">
    </div>

    <div class="grupo-formulario">
      <label class="etiqueta-formulario">Categoria / Seccion</label>
      <select class="entrada-vintage select-retro">
        <option>Tecnologia</option>
        <option>Ciencia</option>
        <option>Entretenimiento</option>
      </select>
    </div>

    <div class="grupo-formulario">
      <label class="etiqueta-formulario">Cuerpo del Articulo</label>
      <textarea class="entrada-vintage area-texto-larga" placeholder="Desarrolla el contenido aqui..."></textarea>
    </div>

    <div class="acciones-formulario">
      <button type="button" class="boton-retro-secundario" routerLink="/noticias">Descartar Borrador</button>
      <button type="button" class="boton-retro" routerLink="/noticias">Publicar Articulo</button>
    </div>
  </form>
</div>
