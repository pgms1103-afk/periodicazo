<div class="contenedor-modulo">
  <div class="encabezado-modulo">
    <h2 class="titulo-marca">Titulares del Dia</h2>
    <button *ngIf="rolActual === 'ADMIN'" class="boton-retro" routerLink="/editor-noticias">
      <i class="fa-solid fa-feather-pointed icono-btn"></i> Redactar Columna
    </button>
  </div>

  <div *ngIf="mensajeError" class="alerta-error-retro">
    [FE DE ERRATAS]: {{ mensajeError }}
  </div>

  <div *ngIf="noticias.length === 0 && !mensajeError" class="mensaje-vacio">
    La prensa aun no ha imprimido las noticias de hoy.
  </div>

  <div class="cuadricula-tarjetas">
    <div class="tarjeta-vintage sombra-retro tarjeta-contenido animate__animated animate__fadeInUp" *ngFor="let n of noticias">
      <span class="etiqueta-categoria">{{ n.categoria }}</span>
      <h3 class="titulo-articulo">{{ n.titulo }}</h3>
      <p class="resumen-articulo">{{ n.contenido | slice:0:120 }}...</p>

      <div class="acciones-articulo">
        <button class="boton-accion" (click)="leerCompleto(n)">
          <i class="fa-solid fa-eye icono-btn"></i> Leer
        </button>
        <button *ngIf="rolActual === 'ADMIN' || rolActual === 'COMENTADOR'" class="boton-accion" (click)="irAComentarios(n)">
          <i class="fa-solid fa-pen-nib icono-btn"></i> Comentar
        </button>
        <button *ngIf="rolActual === 'ADMIN' || rolActual === 'EDITOR'" class="boton-accion" (click)="editarNoticia(n)">
          <i class="fa-solid fa-pen-to-square icono-btn"></i> Editar
        </button>
        <button *ngIf="rolActual === 'ADMIN'" class="boton-accion texto-rojo" (click)="eliminarNoticia(n.id)">
          <i class="fa-solid fa-trash-can icono-btn"></i> Borrar
        </button>
      </div>
    </div>
  </div>
</div>
