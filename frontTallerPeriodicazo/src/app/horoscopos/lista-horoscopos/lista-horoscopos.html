<div class="contenedor-modulo">
  <div class="encabezado-modulo">
    <h2 class="titulo-marca">Predicciones de la Semana</h2>
    <button *ngIf="rolActual === 'ADMIN'" class="boton-retro" routerLink="/editor-horoscopos">
      <i class="fa-solid fa-wand-magic-sparkles icono-btn"></i> Redactar Horoscopo
    </button>
  </div>

  <div *ngIf="mensajeError" class="alerta-error-retro">
    [FE DE ERRATAS]: {{ mensajeError }}
  </div>

  <div *ngIf="horoscopos.length === 0 && !mensajeError" class="mensaje-vacio">
    Los astros aún no han revelado sus secretos. No hay horóscopos impresos.
  </div>

  <div class="cuadricula-tarjetas">
    <div class="tarjeta-vintage sombra-retro tarjeta-contenido centrado animate__animated animate__fadeInUp" *ngFor="let h of horoscopos">

      <div class="icono-signo">{{ obtenerIcono(h.signo) }}</div>
      <h3 class="titulo-articulo">{{ h.signo }}</h3>
      <span class="fecha-horoscopo">Elemento: {{ h.elemento }}</span>
      <h4 class="subtitulo-horoscopo">{{ h.titulo }}</h4>
      <p class="resumen-articulo mt-10">{{ h.contenido | slice:0:100 }}...</p>

      <div class="acciones-articulo justificado-centro">
        <button class="boton-accion" (click)="leerCompleto(h)">
          <i class="fa-solid fa-eye icono-btn"></i> Leer
        </button>
        <button *ngIf="rolActual === 'ADMIN' || rolActual === 'COMENTADOR'" class="boton-accion" (click)="irAComentarios(h)">
          <i class="fa-solid fa-pen-nib icono-btn"></i> Comentar
        </button>
        <button *ngIf="rolActual === 'ADMIN' || rolActual === 'EDITOR'" class="boton-accion" (click)="editarHoroscopo(h)">
          <i class="fa-solid fa-pen-to-square icono-btn"></i> Editar
        </button>
        <button *ngIf="rolActual === 'ADMIN'" class="boton-accion texto-rojo" (click)="eliminarHoroscopo(h.id)">
          <i class="fa-solid fa-trash-can icono-btn"></i> Borrar
        </button>
      </div>
    </div>
  </div>
</div>
