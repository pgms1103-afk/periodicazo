<div class="contenedor-modulo">
  <button class="boton-volver" routerLink="/horoscopos">← Regresar a Seccion Astral</button>

  <div class="encabezado-modulo">
    <h2 class="titulo-editor">{{ modoEditar ? 'Editar Predicción' : 'Gabinete Astrológico' }}</h2>
  </div>

  <form class="tarjeta-vintage sombra-retro formulario-edicion">

    <div *ngIf="mensajeError" class="alerta-error-retro" style="color: #8b0000; font-weight: bold; margin-bottom: 20px;">
      [FE DE ERRATAS]: {{ mensajeError }}
    </div>

    <div class="grupo-formulario">
      <label class="etiqueta-formulario">Titulo Horoscopo</label>
      <input type="text" class="entrada-vintage" [(ngModel)]="titulo" name="titulo" placeholder="Escribe el encabezado mistico para el signo...">
    </div>

    <div class="grupo-formulario-fila">
      <div class="columna-formulario">
        <label class="etiqueta-formulario">Signo</label>
        <select class="entrada-vintage select-retro" [(ngModel)]="signo" name="signo">
          <option value="Aries">Aries</option>
          <option value="Tauro">Tauro</option>
          <option value="Geminis">Geminis</option>
          <option value="Cancer">Cancer</option>
          <option value="Leo">Leo</option>
          <option value="Virgo">Virgo</option>
          <option value="Libra">Libra</option>
          <option value="Escorpio">Escorpio</option>
          <option value="Sagitario">Sagitario</option>
          <option value="Capricornio">Capricornio</option>
          <option value="Acuario">Acuario</option>
          <option value="Piscis">Piscis</option>
        </select>
      </div>

      <div class="columna-formulario">
        <label class="etiqueta-formulario">Elemento Cosmico</label>
        <select class="entrada-vintage select-retro" [(ngModel)]="elemento" name="elemento">
          <option value="Fuego">Fuego</option>
          <option value="Tierra">Tierra</option>
          <option value="Aire">Aire</option>
          <option value="Agua">Agua</option>
        </select>
      </div>
    </div>

    <div class="grupo-formulario-fila">
      <div class="columna-formulario">
        <label class="etiqueta-formulario">Astrologo / Autor</label>
        <input type="text" class="entrada-vintage" [(ngModel)]="autor" name="autor" placeholder="Nombre del interprete de las estrellas...">
      </div>

      <div class="columna-formulario">
        <label class="etiqueta-formulario">Editorial</label>
        <input type="text" class="entrada-vintage" [(ngModel)]="editorial" name="editorial" placeholder="Casa editora...">
      </div>
    </div>

    <div class="grupo-formulario">
      <label class="etiqueta-formulario">Presagio / Contenido</label>
      <textarea class="entrada-vintage area-texto-larga" [(ngModel)]="contenido" name="contenido" placeholder="Escriba la prediccion astral completa aqui..."></textarea>
    </div>

    <div class="acciones-formulario">
      <button type="button" class="boton-retro-secundario" routerLink="/horoscopos">Descartar Borrador</button>
      <button type="button" class="boton-retro" (click)="guardarHoroscopo()">
        {{ modoEditar ? 'Guardar Cambios' : 'Publicar Horoscopo' }}
      </button>
    </div>
  </form>
</div>
